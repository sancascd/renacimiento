<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renaissance Academy</title>
<meta name="description" content="Renaissance Academy — tu universidad personal. Un lugar para alimentar la curiosidad, a tu ritmo.">
<meta name="theme-color" content="#0a0a0f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f; --panel:#15151e; --panel-2:#1b1b27;
    --line:#2a2a38; --line-soft:#1f1f2a;
    --txt:#eceef4; --txt-soft:#a7abb8; --txt-faint:#717584;
    --ice:#9bdcff; --mag:#ff5db1; --gold:#ffd66e;
    --maxw:1080px;
    --ui:'Space Grotesk',system-ui,sans-serif;
    --mono:'IBM Plex Mono',monospace;
    --display:'Anton',sans-serif;
    --chrome:linear-gradient(176deg,#ffffff 8%,#cfd6e0 34%,#7e8694 50%,#f4f7fb 60%,#aab2bf 78%,#5e6573 100%);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:var(--ui); font-size:16px; line-height:1.6;
    -webkit-font-smoothing:antialiased; position:relative; min-height:100vh;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(80% 60% at 12% -5%, rgba(74,30,108,.5), transparent 60%),
      radial-gradient(75% 60% at 105% 105%, rgba(13,58,88,.45), transparent 60%),
      radial-gradient(45% 45% at 75% 28%, rgba(104,24,64,.3), transparent 65%);
  }
  button{font-family:inherit;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}
  .chrome-text{background:var(--chrome);-webkit-background-clip:text;background-clip:text;color:transparent;}

  /* ============ LANDING ============ */
  body[data-view="landing"] .topbar,
  body[data-view="landing"] footer{display:none;}

  .landing{min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .l-nav{display:flex;justify-content:space-between;align-items:center;padding:22px 30px;font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--txt-faint);position:relative;z-index:5;}
  .l-nav .dot{color:var(--mag);}
  .l-nav .clk{color:var(--ice);}
  .l-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px 24px 0;position:relative;z-index:5;}
  .spark{position:absolute;color:#fff;z-index:1;font-size:16px;text-shadow:0 0 8px var(--ice);animation:tw 3.4s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.25;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}

  .l-eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.36em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;}
  .word{font-family:var(--display);text-transform:uppercase;line-height:.82;letter-spacing:.012em;font-size:clamp(3.4rem,13vw,9.5rem);position:relative;filter:drop-shadow(0 3px 0 #25262d);}
  .word::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 38%,rgba(255,255,255,.85) 50%,transparent 62%);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;mix-blend-mode:screen;animation:sweep 5s linear infinite;}
  @keyframes sweep{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .acad{font-family:var(--ui);font-weight:700;letter-spacing:.6em;text-transform:uppercase;font-size:clamp(.78rem,2.4vw,1.35rem);color:var(--txt);margin:16px 0 0 .6em;}
  .l-quote{margin-top:30px;min-height:1.4em;font-family:var(--mono);font-size:clamp(.74rem,1.7vw,.95rem);letter-spacing:.14em;text-transform:uppercase;color:var(--ice);transition:opacity .3s;}
  .l-quote b{color:var(--mag);font-weight:500;}
  .l-cta{margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:16px;}
  .btn-enter{display:inline-flex;align-items:center;gap:11px;font-family:var(--ui);font-weight:600;font-size:.82rem;letter-spacing:.2em;text-transform:uppercase;color:#0a0a0c;background:linear-gradient(180deg,#fff,#c2c8d2 55%,#eef1f5);border:none;padding:15px 34px;border-radius:40px;cursor:pointer;box-shadow:0 0 0 1px rgba(255,255,255,.35),0 12px 30px -12px var(--mag);transition:transform .2s,box-shadow .2s;}
  .btn-enter:hover{transform:translateY(-2px);box-shadow:0 0 0 1px #fff,0 16px 38px -12px var(--ice);}
  .btn-enter:focus-visible{outline:2px solid var(--ice);outline-offset:3px;}
  .l-surprise{background:none;border:none;cursor:pointer;color:var(--txt-faint);font-family:var(--mono);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;padding:4px;transition:color .2s;}
  .l-surprise:hover{color:var(--mag);}
  .l-pillars{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;padding:0 24px 30px;font-family:var(--mono);font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--txt-faint);position:relative;z-index:5;}
  .l-pillars i{color:var(--mag);font-style:normal;}

  .reveal{opacity:0;transform:translateY(16px);animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards;}
  .d1{animation-delay:.1s;}.d2{animation-delay:.26s;}.d3{animation-delay:.44s;}.d4{animation-delay:.64s;}.d5{animation-delay:.84s;}.d6{animation-delay:1.05s;}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  /* ============ TOPBAR ============ */
  .topbar{background:rgba(10,10,15,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:30;border-bottom:1px solid var(--line);}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:14px;padding-top:14px;padding-bottom:14px;}
  .brand{display:flex;align-items:baseline;gap:12px;cursor:pointer;}
  .brand .name{font-family:var(--ui);font-weight:700;font-size:1rem;letter-spacing:.04em;text-transform:uppercase;}
  .brand .sub{font-family:var(--mono);font-size:.58rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);}
  .top-right{display:flex;align-items:center;gap:16px;}
  .top-clock{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;color:var(--ice);}
  .topbtn{background:transparent;color:var(--txt-soft);border:1px solid var(--line);border-radius:30px;font-family:var(--mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;padding:9px 16px;cursor:pointer;transition:border-color .2s,color .2s,background .2s;}
  .topbtn:hover{border-color:var(--mag);color:var(--txt);background:rgba(255,93,177,.08);}
  .topbtn:focus-visible{outline:2px solid var(--ice);outline-offset:2px;}

  /* ============ CATALOGUE ============ */
  .intro{padding:50px 0 6px;}
  .intro .eyebrow{font-family:var(--mono);font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:12px;}
  .intro h1{font-family:var(--ui);font-weight:700;font-size:clamp(2rem,5vw,3rem);margin:0 0 .25em;letter-spacing:.01em;text-transform:uppercase;}
  .intro p{color:var(--txt-soft);max-width:52ch;margin:0;font-size:1rem;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:34px 0 60px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px 24px 20px;cursor:pointer;text-align:left;display:flex;flex-direction:column;min-height:178px;transition:transform .2s ease,border-color .22s ease,box-shadow .25s ease;position:relative;overflow:hidden;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--ice),var(--mag));opacity:0;transition:opacity .25s;}
  .card:hover{transform:translateY(-3px);border-color:#3a3a4d;box-shadow:0 18px 40px -24px var(--mag),0 0 0 1px rgba(155,220,255,.15);}
  .card:hover::before{opacity:1;}
  .card:focus-visible{outline:2px solid var(--ice);outline-offset:2px;}
  .card .idx{font-family:var(--mono);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
  .card h2{font-family:var(--ui);font-weight:600;font-size:1.5rem;line-height:1.1;margin:12px 0 8px;color:#e8ebf1;}
  .card .blurb{color:var(--txt-soft);font-size:.95rem;flex:1;}
  .card .meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:18px;font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;color:var(--txt-faint);text-transform:uppercase;}
  .card .meta b{color:var(--ice);font-weight:500;}
  .card.add{align-items:center;justify-content:center;text-align:center;border-style:dashed;background:transparent;color:var(--txt-soft);}
  .card.add .plus{font-family:var(--display);font-size:2.2rem;line-height:1;}
  .card.add span{display:block;margin-top:6px;font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;}

  /* ============ TOPIC DETAIL ============ */
  .detail{padding:36px 0 70px;}
  .back{background:none;border:none;color:var(--ice);cursor:pointer;font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;padding:6px 0;margin-bottom:20px;}
  .back:hover{color:var(--txt);}
  .detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;border-bottom:1px solid var(--line);padding-bottom:26px;margin-bottom:30px;}
  .detail-head h1{font-family:var(--ui);font-weight:700;font-size:clamp(2rem,5vw,2.8rem);margin:0 0 .2em;letter-spacing:.01em;text-transform:uppercase;}
  .detail-head .blurb{color:var(--txt-soft);max-width:50ch;margin:0;font-size:1rem;}
  .danger-link{background:none;border:none;color:var(--txt-faint);cursor:pointer;font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
  .danger-link:hover{color:var(--mag);}

  .section{margin-bottom:46px;}
  .section-title{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:16px;}
  .section-title h3{font-family:var(--ui);font-weight:600;font-size:1.4rem;margin:0;letter-spacing:.01em;}

  .addbtn{background:transparent;color:var(--ice);border:1px solid var(--line);border-radius:30px;font-family:var(--mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;padding:9px 16px;cursor:pointer;transition:background .2s,color .2s,border-color .2s;}
  .addbtn:hover{border-color:var(--ice);background:rgba(155,220,255,.08);}
  .addbtn:focus-visible{outline:2px solid var(--ice);outline-offset:2px;}

  .item{display:flex;gap:15px;align-items:flex-start;padding:17px 0;border-top:1px solid var(--line-soft);}
  .item:first-child{border-top:none;}
  .status{flex:none;margin-top:3px;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--txt-faint);background:transparent;cursor:pointer;position:relative;transition:.2s;}
  .status[data-s="encurso"]{border-color:var(--ice);background:linear-gradient(90deg,var(--ice) 50%,transparent 50%);}
  .status[data-s="hecho"]{border-color:var(--mag);background:linear-gradient(135deg,var(--ice),var(--mag));}
  .status[data-s="hecho"]::after{content:"";position:absolute;left:5px;top:2px;width:4px;height:8px;border:solid #0a0a0f;border-width:0 2px 2px 0;transform:rotate(45deg);}
  .status:focus-visible{outline:2px solid var(--ice);outline-offset:2px;}
  .item-body{flex:1;min-width:0;}
  .item-body .kind{font-family:var(--mono);font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:3px 10px;display:inline-block;margin-bottom:7px;}
  .item-body .title{font-size:1.08rem;line-height:1.3;color:var(--txt);}
  .item-body .title.done{color:var(--txt-faint);text-decoration:line-through;text-decoration-color:var(--mag);}
  .item-body .author{color:var(--txt-soft);font-size:.92rem;}
  .item-body .note{margin-top:7px;color:var(--txt-soft);font-size:.92rem;background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;padding:9px 12px;}
  .item-actions{flex:none;display:flex;gap:10px;align-items:center;}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--txt-faint);font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 2px;}
  .icon-btn:hover{color:var(--ice);}
  .icon-btn.del:hover{color:var(--mag);}

  .learning{padding:17px 0;border-top:1px solid var(--line-soft);}
  .learning:first-child{border-top:none;}
  .learning .date{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
  .learning .ltext{white-space:pre-wrap;color:var(--txt);}
  .learning .lrow{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;}

  .empty{color:var(--txt-faint);font-style:italic;padding:14px 0;}

  /* forms */
  .form{background:var(--panel);border:1px solid var(--line);border-left:3px solid;border-image:linear-gradient(180deg,var(--ice),var(--mag)) 1;border-radius:0 12px 12px 0;padding:22px;margin:8px 0 18px;}
  .form .row{margin-bottom:15px;}
  .form label{display:block;font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-soft);margin-bottom:7px;}
  .form input,.form select,.form textarea{width:100%;font-family:var(--ui);font-size:1rem;color:var(--txt);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:11px 13px;}
  .form textarea{resize:vertical;min-height:92px;line-height:1.5;}
  .form input:focus,.form select:focus,.form textarea:focus{outline:none;border-color:var(--ice);box-shadow:0 0 0 3px rgba(155,220,255,.15);}
  .form input::placeholder,.form textarea::placeholder{color:var(--txt-faint);}
  .form-actions{display:flex;gap:10px;margin-top:6px;}
  .btn-primary{background:linear-gradient(180deg,#fff,#c2c8d2 60%,#eef1f5);color:#0a0a0c;border:none;border-radius:30px;font-family:var(--ui);font-weight:600;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;padding:12px 22px;cursor:pointer;transition:transform .15s,box-shadow .2s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 22px -10px var(--ice);}
  .btn-ghost{background:none;border:1px solid var(--line);border-radius:30px;color:var(--txt-soft);font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;padding:12px 22px;cursor:pointer;}
  .btn-ghost:hover{border-color:var(--txt-soft);color:var(--txt);}

  footer{border-top:1px solid var(--line);padding:26px 0 44px;margin-top:10px;}
  footer .wrap{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
  footer .note{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;color:var(--txt-faint);text-transform:uppercase;}

  .loading{padding:100px 26px;text-align:center;color:var(--txt-soft);font-style:italic;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#15151e;border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;padding:12px 20px;border-radius:30px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:70;text-transform:uppercase;}
  .toast.show{opacity:1;}

  @media (max-width:560px){
    .detail-head{flex-direction:column;}
    .item-actions{flex-direction:column;gap:4px;}
    .brand .sub{display:none;}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto;}
    *{transition:none!important;}
    .reveal{opacity:1;transform:none;animation:none;}
    .word::after,.spark{animation:none;}
    .word::after{display:none;}
  }
</style>
</head>
<body data-view="landing">
  <div class="topbar">
    <div class="wrap">
      <div class="brand" data-action="home" role="button" tabindex="0" aria-label="Volver al inicio">
        <span class="name chrome-text">Renaissance Academy</span>
        <span class="sub">est. mmxxvi</span>
      </div>
      <div class="top-right">
        <span class="top-clock" data-clock>--:--:--</span>
        <button class="topbtn" data-action="surprise">Sorpréndeme</button>
      </div>
    </div>
  </div>

  <main id="app">
    <div class="loading">Encendiendo la academia…</div>
  </main>

  <footer>
    <div class="wrap">
      <span class="note" id="saveNote">Tus cambios se guardan solos</span>
      <button class="danger-link" data-action="reset">Reiniciar catálogo</button>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

<script>
"use strict";

const STORAGE_KEY = "renacimiento:catalogo";
let usingStorage = (function(){try{const k="__rn_test__";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}})();

const KINDS = [
  {v:"libro",      l:"Libro"},
  {v:"documental", l:"Documental"},
  {v:"video",      l:"Vídeo"},
  {v:"articulo",   l:"Artículo"},
  {v:"curso",      l:"Curso / web"},
  {v:"pregunta",   l:"Pregunta"},
  {v:"otro",       l:"Otro"}
];
const kindLabel = v => (KINDS.find(k=>k.v===v)||{l:"Otro"}).l;
const STATUS_ORDER = ["pendiente","encurso","hecho"];

const QUOTES = [
  "Can't rush <b>greatness</b>",
  "Stop scrolling — <b>start creating</b>",
  "Crazy faith que <b>todo va a salir bien</b>",
  "To be ballin' <b>you gotta b-all-in</b>",
  "Una <b>para una misma</b>",
  "Hoy <b>me apetece</b>…"
];

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function uid(){return "id_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);}
function greeting(){const h=new Date().getHours();if(h<6)return"Buenas noches";if(h<13)return"Buenos días";if(h<21)return"Buenas tardes";return"Buenas noches";}

function seed(){
  const T = (name,blurb,items)=>({id:uid(),name,blurb,items:items.map(i=>({id:uid(),kind:i[0],title:i[1],author:i[2]||"",note:"",status:"pendiente"})),learnings:[]});
  return {topics:[
    T("Astronomía y cosmología","De qué está hecho todo y por qué el cielo es como es.",[
      ["libro","Cosmos","Carl Sagan"],
      ["libro","Una breve historia del tiempo","Stephen Hawking"],
      ["libro","Astrofísica para gente con prisa","Neil deGrasse Tyson"],
      ["documental","Cosmos: una odisea en el espacio-tiempo",""],
      ["video","Kurzgesagt","Canal de YouTube"]
    ]),
    T("Matemáticas con asombro","Recuperar la curiosidad por los números desde preguntas bonitas, no desde ejercicios.",[
      ["video","3Blue1Brown","Canal de YouTube"],
      ["libro","El placer de la x","Steven Strogatz"],
      ["libro","El hombre que calculaba","Malba Tahan"],
      ["libro","Cartas a una joven matemática","Ian Stewart"],
      ["pregunta","¿Qué es realmente π y por qué aparece en todas partes?",""],
      ["pregunta","¿Qué significa el infinito? ¿Y el número e?",""],
      ["pregunta","¿Cómo se descubrió el cero? ¿Qué son los fractales?",""]
    ]),
    T("Historia","Cómo llegamos hasta aquí.",[
      ["libro","Sapiens","Yuval Noah Harari"],
      ["libro","Armas, gérmenes y acero","Jared Diamond"],
      ["pregunta","Elige una época que te atraiga y empieza solo por ahí",""]
    ]),
    T("Psicología y neurociencia","Cómo funciona la mente por dentro.",[
      ["libro","Pensar rápido, pensar despacio","Daniel Kahneman"],
      ["libro","El error de Descartes","António Damásio"],
      ["libro","Compórtate","Robert Sapolsky"],
      ["libro","Incógnito","David Eagleman"]
    ]),
    T("Arquitectura y diseño","Por qué los espacios nos hacen sentir lo que sentimos.",[
      ["libro","Atmósferas","Peter Zumthor"],
      ["libro","Hacia una arquitectura","Le Corbusier"],
      ["libro","La poética del espacio","Gaston Bachelard"],
      ["pregunta","Elige un edificio que te guste y averigua por qué está construido así",""]
    ]),
    T("Filosofía de la ciencia","Cómo sabemos lo que sabemos.",[
      ["libro","El mundo y sus demonios","Carl Sagan"],
      ["libro","¿Qué es esa cosa llamada ciencia?","Alan Chalmers"],
      ["libro","La estructura de las revoluciones científicas","Thomas Kuhn"]
    ]),
    T("Ajedrez y problemas","Entrenar la concentración y la paciencia, sin competir.",[
      ["curso","lichess.org","Jugar y hacer puzzles, gratis"],
      ["libro","Bobby Fischer enseña ajedrez",""],
      ["pregunta","Aprender los principios de apertura, sin mirar el Elo",""],
      ["otro","Cubo de Rubik por capas","Resolverlo alguna vez, sin cronómetro"]
    ])
  ]};
}

let state = null;
const ui = {view:"landing", topicId:null, form:null};

function loadState(){
  if(!usingStorage) return null;
  try{const raw = localStorage.getItem(STORAGE_KEY);return raw ? JSON.parse(raw) : null;}catch(e){ return null; }
}
let saveTimer=null;
function saveState(){
  if(!usingStorage){flashNote("Este navegador no permite guardar");return;}
  try{localStorage.setItem(STORAGE_KEY, JSON.stringify(state));flashNote("Guardado");}catch(e){flashNote("No se pudo guardar");}
}
function flashNote(txt){
  const n=document.getElementById("saveNote");if(!n) return;
  n.textContent = txt;clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{n.textContent = usingStorage?"Tus cambios se guardan solos":"Cambios solo en esta sesión";},1600);
}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700);}

/* ---------- helpers ---------- */
function topic(id){return state.topics.find(t=>t.id===id);}
function counts(t){const total=t.items.length;const pend=t.items.filter(i=>i.status!=="hecho").length;return {total,pend,learn:t.learnings.length};}

/* ---------- live bits (clock + quote) ---------- */
function paintClocks(){
  const d=new Date();
  const s=[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,"0")).join(":");
  document.querySelectorAll("[data-clock]").forEach(e=>{e.textContent=s;});
}
let qi=0;
function rotQuote(){
  const el=document.querySelector("[data-quote]");if(!el) return;
  el.style.opacity=0;
  setTimeout(()=>{qi=(qi+1)%QUOTES.length;el.innerHTML=QUOTES[qi];el.style.opacity=1;},300);
}

/* ---------- render ---------- */
const app = document.getElementById("app");

function render(){
  if(ui.view==="landing"){ document.body.dataset.view="landing"; renderLanding(); paintClocks(); return; }
  if(ui.view==="topic" && topic(ui.topicId)){ document.body.dataset.view="topic"; renderTopic(); paintClocks(); return; }
  ui.view="catalogue"; document.body.dataset.view="catalogue"; renderCatalogue(); paintClocks();
}

function renderLanding(){
  qi=0;
  app.innerHTML = `
    <section class="landing">
      <span class="spark" style="top:16%;left:18%">✦</span>
      <span class="spark" style="top:26%;left:82%;animation-delay:1s">✦</span>
      <span class="spark" style="top:66%;left:12%;animation-delay:1.8s">✧</span>
      <span class="spark" style="top:70%;left:86%;animation-delay:.6s">✦</span>
      <span class="spark" style="top:12%;left:55%;animation-delay:2.3s">✧</span>
      <div class="l-nav">
        <span>Renaissance Academy <span class="dot">●</span> est. mmxxvi</span>
        <span class="clk" data-clock>--:--:--</span>
      </div>
      <div class="l-hero">
        <div class="l-eyebrow reveal d1">${greeting()} · tu universidad personal</div>
        <h1 class="word chrome-text reveal d2">Renaissance</h1>
        <div class="acad reveal d3">Academy</div>
        <div class="l-quote reveal d4" data-quote>${QUOTES[0]}</div>
        <div class="l-cta reveal d5">
          <button class="btn-enter" data-action="enter">Entrar &#9656;</button>
          <button class="l-surprise" data-action="surprise">o sorpréndeme &rarr;</button>
        </div>
      </div>
      <div class="l-pillars reveal d6"><span>Comprender</span><i>✦</i><span>Crear</span><i>✦</i><span>Resolver</span><i>✦</i><span>Cuerpo</span></div>
    </section>`;
}

function renderCatalogue(){
  const cards = state.topics.map((t,i)=>{
    const c=counts(t);
    return `<button class="card" data-action="open" data-id="${t.id}">
      <span class="idx">Tema ${String(i+1).padStart(2,"0")}</span>
      <h2>${esc(t.name)}</h2>
      <span class="blurb">${esc(t.blurb)}</span>
      <span class="meta">
        <span><b>${c.total}</b> en la lista</span>
        <span><b>${c.pend}</b> por explorar</span>
        <span><b>${c.learn}</b> apuntes</span>
      </span>
    </button>`;
  }).join("");

  const addCard = `<button class="card add" data-action="new-topic"><span class="plus chrome-text">+</span><span>Añadir tema</span></button>`;

  app.innerHTML = `
    <div class="wrap intro">
      <span class="eyebrow">${greeting()} · hoy me apetece…</span>
      <h1>El catálogo</h1>
      <p>Llega, mira qué te llama y entra. Cada tema guarda sus lecturas, recursos y lo que vayas aprendiendo.</p>
    </div>
    <div class="wrap"><div class="grid">${cards}${ui.form&&ui.form.type==="topic"?"":addCard}</div>
    ${ui.form&&ui.form.type==="topic"?`<div style="padding-bottom:50px">${topicForm()}</div>`:""}</div>`;
}

function topicForm(){
  const d=ui.form.draft||{name:"",blurb:""};
  return `<div class="form" data-form="topic">
    <div class="row"><label>Nombre del tema</label><input id="f-name" type="text" value="${esc(d.name)}" placeholder="p. ej. Música, Biología, Trading…"></div>
    <div class="row"><label>Descripción corta</label><input id="f-blurb" type="text" value="${esc(d.blurb)}" placeholder="Una línea que capture por qué te interesa"></div>
    <div class="form-actions">
      <button class="btn-primary" data-action="save-topic">${ui.form.mode==="edit"?"Guardar":"Crear tema"}</button>
      <button class="btn-ghost" data-action="cancel-form">Cancelar</button>
    </div>
  </div>`;
}

function renderTopic(){
  const t=topic(ui.topicId);
  const items = t.items.length ? t.items.map(it=>itemRow(t,it)).join("") : `<p class="empty">Aún no hay nada aquí. Añade el primer libro o recurso.</p>`;
  const learnings = t.learnings.length
    ? [...t.learnings].sort((a,b)=>b.ts-a.ts).map(l=>learningRow(t,l)).join("")
    : `<p class="empty">Cuando aprendas o pienses algo sobre este tema, apúntalo aquí. No hace falta que sea redondo.</p>`;

  const itemFormHtml = ui.form && ui.form.type==="item" && ui.form.tid===t.id ? itemForm(t) : "";
  const learnFormHtml = ui.form && ui.form.type==="learning" && ui.form.tid===t.id ? learningForm() : "";

  app.innerHTML = `
    <div class="wrap detail">
      <button class="back" data-action="back">← Catálogo</button>
      <div class="detail-head">
        <div>
          <h1>${esc(t.name)}</h1>
          <p class="blurb">${esc(t.blurb)}</p>
        </div>
        <button class="danger-link" data-action="edit-topic" data-id="${t.id}">Editar tema</button>
      </div>

      <div class="section">
        <div class="section-title">
          <h3>Lecturas y recursos</h3>
          <button class="addbtn" data-action="new-item" data-tid="${t.id}">+ Añadir</button>
        </div>
        ${itemFormHtml}
        ${items}
      </div>

      <div class="section">
        <div class="section-title">
          <h3>Lo que he aprendido</h3>
          <button class="addbtn" data-action="new-learning" data-tid="${t.id}">+ Apuntar</button>
        </div>
        ${learnFormHtml}
        ${learnings}
      </div>
    </div>`;
}

function itemRow(t,it){
  const done = it.status==="hecho";
  return `<div class="item">
    <button class="status" data-s="${it.status}" data-action="cycle" data-tid="${t.id}" data-iid="${it.id}" title="Cambiar estado" aria-label="Cambiar estado"></button>
    <div class="item-body">
      <span class="kind">${esc(kindLabel(it.kind))}</span>
      <div class="title ${done?"done":""}">${esc(it.title)}</div>
      ${it.author?`<div class="author">${esc(it.author)}</div>`:""}
      ${it.note?`<div class="note">${esc(it.note)}</div>`:""}
    </div>
    <div class="item-actions">
      <button class="icon-btn" data-action="edit-item" data-tid="${t.id}" data-iid="${it.id}">Editar</button>
      <button class="icon-btn del" data-action="del-item" data-tid="${t.id}" data-iid="${it.id}">Quitar</button>
    </div>
  </div>`;
}

function itemForm(t){
  const d=ui.form.draft||{kind:"libro",title:"",author:"",note:""};
  const opts=KINDS.map(k=>`<option value="${k.v}" ${k.v===d.kind?"selected":""}>${k.l}</option>`).join("");
  return `<div class="form" data-form="item">
    <div class="row"><label>Tipo</label><select id="f-kind">${opts}</select></div>
    <div class="row"><label>Título</label><input id="f-title" type="text" value="${esc(d.title)}" placeholder="Título del libro, vídeo, pregunta…"></div>
    <div class="row"><label>Autor o fuente <span style="text-transform:none;letter-spacing:0">(opcional)</span></label><input id="f-author" type="text" value="${esc(d.author)}"></div>
    <div class="row"><label>Nota <span style="text-transform:none;letter-spacing:0">(opcional)</span></label><textarea id="f-note" placeholder="Por qué te interesa, o lo que quieras recordar de esto">${esc(d.note)}</textarea></div>
    <div class="form-actions">
      <button class="btn-primary" data-action="save-item">${ui.form.mode==="edit"?"Guardar":"Añadir"}</button>
      <button class="btn-ghost" data-action="cancel-form">Cancelar</button>
    </div>
  </div>`;
}

function learningRow(t,l){
  return `<div class="learning">
    <div class="lrow">
      <div>
        <div class="date">${esc(l.date)}</div>
        <div class="ltext">${esc(l.text)}</div>
      </div>
      <button class="icon-btn del" data-action="del-learning" data-tid="${t.id}" data-lid="${l.id}">Borrar</button>
    </div>
  </div>`;
}

function learningForm(){
  const d=ui.form.draft||{text:""};
  return `<div class="form" data-form="learning">
    <div class="row"><label>¿Qué has aprendido o pensado?</label><textarea id="f-ltext" placeholder="Una idea que te sorprendió, una conexión, una duda nueva…">${esc(d.text)}</textarea></div>
    <div class="form-actions">
      <button class="btn-primary" data-action="save-learning">Guardar apunte</button>
      <button class="btn-ghost" data-action="cancel-form">Cancelar</button>
    </div>
  </div>`;
}

/* ---------- events ---------- */
function val(id){const e=document.getElementById(id);return e?e.value.trim():"";}

document.addEventListener("click",(e)=>{
  const el=e.target.closest("[data-action]");
  if(!el) return;
  const a=el.dataset.action;

  if(a==="enter"){ui.view="catalogue";ui.form=null;render();window.scrollTo(0,0);return;}
  if(a==="home"){ui.view="landing";ui.topicId=null;ui.form=null;render();window.scrollTo(0,0);return;}
  if(a==="open"){ui.topicId=el.dataset.id;ui.view="topic";ui.form=null;render();window.scrollTo(0,0);return;}
  if(a==="back"){ui.view="catalogue";ui.topicId=null;ui.form=null;render();window.scrollTo(0,0);return;}

  if(a==="new-topic"){ui.form={type:"topic",mode:"add",draft:{name:"",blurb:""}};render();return;}
  if(a==="edit-topic"){const t=topic(el.dataset.id);ui.form={type:"topic",mode:"edit",id:t.id,draft:{name:t.name,blurb:t.blurb}};render();return;}
  if(a==="save-topic"){
    const name=val("f-name");if(!name){toast("Ponle un nombre al tema");return;}
    const blurb=val("f-blurb");
    if(ui.form.mode==="edit"){const t=topic(ui.form.id);t.name=name;t.blurb=blurb;}
    else{state.topics.push({id:uid(),name,blurb,items:[],learnings:[]});}
    ui.form=null;saveState();render();return;
  }

  if(a==="new-item"){ui.form={type:"item",mode:"add",tid:el.dataset.tid,draft:{kind:"libro",title:"",author:"",note:""}};render();return;}
  if(a==="edit-item"){
    const t=topic(el.dataset.tid);const it=t.items.find(x=>x.id===el.dataset.iid);
    ui.form={type:"item",mode:"edit",tid:t.id,iid:it.id,draft:{kind:it.kind,title:it.title,author:it.author,note:it.note}};render();return;
  }
  if(a==="save-item"){
    const title=val("f-title");if(!title){toast("Falta el título");return;}
    const data={kind:val("f-kind")||"otro",title,author:val("f-author"),note:val("f-note")};
    const t=topic(ui.form.tid);
    if(ui.form.mode==="edit"){const it=t.items.find(x=>x.id===ui.form.iid);Object.assign(it,data);}
    else{t.items.push({id:uid(),status:"pendiente",...data});}
    ui.form=null;saveState();render();return;
  }
  if(a==="del-item"){
    if(!confirm("¿Quitar este elemento de la lista?"))return;
    const t=topic(el.dataset.tid);t.items=t.items.filter(x=>x.id!==el.dataset.iid);saveState();render();return;
  }
  if(a==="cycle"){
    const t=topic(el.dataset.tid);const it=t.items.find(x=>x.id===el.dataset.iid);
    const idx=STATUS_ORDER.indexOf(it.status);it.status=STATUS_ORDER[(idx+1)%STATUS_ORDER.length];
    saveState();render();return;
  }

  if(a==="new-learning"){ui.form={type:"learning",mode:"add",tid:el.dataset.tid,draft:{text:""}};render();return;}
  if(a==="save-learning"){
    const text=val("f-ltext");if(!text){toast("Escribe algo primero");return;}
    const t=topic(ui.form.tid);
    const date=new Date().toLocaleDateString("es-ES",{day:"numeric",month:"long",year:"numeric"});
    t.learnings.push({id:uid(),ts:Date.now(),date,text});
    ui.form=null;saveState();render();return;
  }
  if(a==="del-learning"){
    if(!confirm("¿Borrar este apunte?"))return;
    const t=topic(el.dataset.tid);t.learnings=t.learnings.filter(x=>x.id!==el.dataset.lid);saveState();render();return;
  }

  if(a==="cancel-form"){ui.form=null;render();return;}

  if(a==="surprise"){
    if(!state.topics.length){toast("Añade un tema primero");return;}
    const t=state.topics[Math.floor(Math.random()*state.topics.length)];
    ui.topicId=t.id;ui.view="topic";ui.form=null;render();window.scrollTo(0,0);
    toast("Hoy: "+t.name);return;
  }

  if(a==="reset"){
    if(!confirm("Esto restaura el catálogo inicial y borra tus añadidos, notas y apuntes. ¿Seguro?"))return;
    state=seed();ui.view="catalogue";ui.topicId=null;ui.form=null;saveState();render();window.scrollTo(0,0);toast("Catálogo reiniciado");return;
  }
});

document.addEventListener("keydown",(e)=>{
  if((e.key==="Enter"||e.key===" ") && e.target.dataset && e.target.dataset.action==="home"){
    e.preventDefault();ui.view="landing";ui.topicId=null;ui.form=null;render();window.scrollTo(0,0);
  }
});

/* ---------- init ---------- */
(function init(){
  const saved=loadState();
  if(saved&&saved.topics){state=saved;}
  else{state=seed();saveState();}
  if(!usingStorage){const n=document.getElementById("saveNote");if(n)n.textContent="Cambios solo en esta sesión";}
  render();
  paintClocks();
  setInterval(paintClocks,1000);
  setInterval(rotQuote,3600);
})();
</script>
</body>
</html>
